name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Quality gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Validate bundled harnesses
        run: npm run validate:harnesses

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Dependency audit
        run: npm audit --audit-level=moderate

      - name: Package contents
        run: npm pack --dry-run

      - name: Secret smoke scan
        run: |
          if git grep -n -I -E '(sk-[A-Za-z0-9_-]{20,}|ghp_[A-Za-z0-9_]{30,}|github_pat_[A-Za-z0-9_]{20,}|BEGIN (RSA|OPENSSH|EC|DSA) PRIVATE KEY|AKIA[0-9A-Z]{16})' -- . ':!.github/workflows/ci.yml'; then
            echo "Potential secret detected."
            exit 1
          fi

      - name: Whitespace check
        run: git diff --check
